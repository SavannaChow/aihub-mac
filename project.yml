name: AIHubMac
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.foss.aihub.mac
    PRODUCT_NAME: AIHubMac
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    GENERATE_INFOPLIST_FILE: YES
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
targets:
  AIHubMac:
    type: application
    platform: macOS
    sources:
      - path: macos/AIHubMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foss.aihub.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_CFBundleDisplayName: AI Hub Mac
        INFOPLIST_KEY_NSCameraUsageDescription: AI Hub may need camera access for AI websites that support live video features.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: AI Hub may need microphone access for AI websites that support voice features.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: AI Hub may need photo library access when uploading files to AI websites.
    scheme:
      testTargets: []
